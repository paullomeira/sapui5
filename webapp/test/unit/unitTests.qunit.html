<!DOCTYPE html>
<html>
<head>
	<title>Unit Tests - SapUI5 Template</title>
	<meta charset="utf-8">

	<script id="sap-ui-bootstrap"
		src="https://ui5.sap.com/resources/sap-ui-core.js"
		data-sap-ui-theme="sap_horizon"
		data-sap-ui-resourceroots='{
			"sapui5.template": "../../"
		}'
		data-sap-ui-animation="false"
		data-sap-ui-compatVersion="edge"
		data-sap-ui-async="true">
	</script>

	<link rel="stylesheet" type="text/css" href="https://ui5.sap.com/resources/sap/ui/thirdparty/qunit-2.css">

	<script type="text/javascript" src="https://ui5.sap.com/resources/sap/ui/thirdparty/qunit-2.js"></script>
	<script type="text/javascript" src="https://ui5.sap.com/resources/sap/ui/qunit/qunit-junit.js"></script>

	<script type="text/javascript">
		sap.ui.getCore().attachInit(function () {
			"use strict";

			sap.ui.require([
				"sapui5/template/test/unit/AllTests"
			], function () {
				QUnit.start();
			});
		});
	</script>
</head>
<body>
	<div id="qunit"></div>
	<div id="qunit-fixture"></div>
</body>
</html>
