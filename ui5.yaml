specVersion: '3.0'
metadata:
  name: sapui5-builder-template
type: application
framework:
  name: OpenUI5
  version: "1.120.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.f
    - name: sap.ui.layout
    - name: sap.ui.unified
    - name: themelib_sap_horizon
server:
  settings:
    httpPort: 8080
builder:
  resources:
    excludes:
      - "/test/**"
      - "/localService/**"